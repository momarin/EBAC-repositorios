      }

  <body>
    <h1>JSON</h1>

    <script>
      // Objeto Literal JS
      const pessoa = {
        nome: "Marina",
        idade: 34,
        ativo: true,
      };

      // JSON equivalente (é todo em string)
      const jsonPessoa = '{"nome": "Marina", "idade": 30, "ativo": true}';

      //   Convertendo de um para o outro
      const objeto = JSON.parse('{"nome": "Marina"}');
      console.log(objeto.nome);

      const json = JSON.stringify({ nome: "Marina" });
      console.log(json);
    </script>
  </body>
